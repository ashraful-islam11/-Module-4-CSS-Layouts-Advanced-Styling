<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid in practice build a calender</title>

    <!-- internal css style  -->
     <style>
        .grid-container{
            display: grid;
            grid-template-columns: repeat(7,auto);
            gap: 20px;
        }
        .day-name{
            background-color: rgb(191, 171, 209);
            padding:5px 10px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;

        }
        .day-name:hover{
            background-color: green;
            color:red;
        }

        .day{
            background-color:rgb(240, 176, 224);
            border-radius: 10px;
            padding: 15px 10px;
            font-size: 2rem;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;

        }
        .day:hover{
            background-color: green;
            color:red;
        }
     </style>
</head>
<body>

    <!-- Grid in Practice Build a Calendar Layout -->
    <section class="grid-container">
        <!-- day name  -->
        <div class="day-name">S</div>
        <div class="day-name">M</div>
        <div class="day-name">T</div>
        <div class="day-name">W</div>
        <div class="day-name">T</div>
        <div class="day-name">F</div>
        <div class="day-name">S</div>
 <!-- day counts  -->
